<!DOCTYPE html>
<html>
<head>
    <title>Logical Methods in AI</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .bg {
            background-image: url('logical-methods.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            color: white;
            font-size: 4em;
            text-align: center;
        }

        .overlay-text {

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.6); /* Semi-transparent white box */
            padding: 20px;
            border-radius: 10px;
            color: black;
            font-size: 2em; /* Larger font size */
            font-weight: bold; /* Bolder font weight */
            text-shadow: 2px 2px 4px #000000; /* Black text shadow */

        }
    </style>
</head>
<body>

<div class="bg">
    <div class="overlay-text">
        <em>coming soon.</em>
    </div>
</div>

</body>
</html>
